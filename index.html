<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的第一个2D游戏</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
    <!-- 引入 Phaser 3 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<script>
    // 游戏主场景
    class MainScene extends Phaser.Scene {
        constructor() {
            super({ key: 'MainScene' });
        }

        // 1. 预加载阶段：加载图片、音频等资源（这里先用纯色方块代替）
        preload() {
            // 动态生成一个红色的玩家方块
            let graphics = this.make.graphics({ x: 0, y: 0 });
            graphics.fillStyle(0xff0000);
            graphics.fillRect(0, 0, 32, 32);
            graphics.generateTexture('player', 32, 32);
            
            // 动态生成绿色的砖块
            graphics.clear();
            graphics.fillStyle(0x00ff00);
            graphics.fillRect(0, 0, 64, 16);
            graphics.generateTexture('brick', 64, 16);
        }

        // 2. 创建阶段：初始化游戏对象
        create() {
            // 开启 Arcade 物理引擎（自带重力和碰撞）
            this.physics.world.setBounds(0, 0, 800, 600);

            // 创建玩家，设置碰撞边界和反弹属性
            this.player = this.physics.add.sprite(400, 500, 'player');
            this.player.setCollideWorldBounds(true);
            this.player.setBounce(1); 

            // 创建几个砖块
            this.bricks = this.physics.add.staticGroup();
            for (let i = 0; i < 5; i++) {
                this.bricks.create(200 + i * 80, 100, 'brick');
            }

            // 设置键盘方向键监听
            this.cursors = this.input.keyboard.createCursorKeys();

            // 设置玩家与砖块的碰撞检测
            this.physics.add.collider(this.player, this.bricks, (player, brick) => {
                brick.destroy(); // 碰到砖块就销毁
            });
        }

        // 3. 更新阶段：每帧执行的游戏逻辑
        update() {
            // 重置速度
            this.player.setVelocity(0);

            // 键盘控制逻辑
            if (this.cursors.left.isDown) {
                this.player.setVelocityX(-200);
            } else if (this.cursors.right.isDown) {
                this.player.setVelocityX(200);
            }

            if (this.cursors.up.isDown) {
                this.player.setVelocityY(-200);
            } else if (this.cursors.down.isDown) {
                this.player.setVelocityY(200);
            }
        }
    }

    // 游戏配置
    const config = {
        type: Phaser.AUTO, // 自动选择 WebGL 或 Canvas 渲染
        width: 800,
        height: 600,
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 0 }, // 关闭重力，方便上下左右移动
                debug: false      // 设为 true 可以看到物理碰撞的边界框
            }
        },
        scene: [MainScene]
    };

    // 启动游戏
    const game = new Phaser.Game(config);
</script>

</body>
</html>
